apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-ms
  namespace: default
spec:
  selector:
    matchLabels:
      app: java-ms
  template:
    metadata:
      labels:
        app: java-ms
    spec:
      containers:
        - name: java-ms
          image: my-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              port: 8080
              path: "/placeholder/health"
            initialDelaySeconds: 15
            timeoutSeconds: 1
          startupProbe:
            httpGet:
              port: 8080
              path: "/placeholder/health"
            initialDelaySeconds: 15
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              port: 8080
              path: "/placeholder/health"
            initialDelaySeconds: 15
            timeoutSeconds: 1
          resources:
            requests:
              memory: 512Mi
              cpu: 1
            limits:
              memory: 512Mi
              cpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: java-ms
  namespace: default
spec:
  selector:
    app: java-ms
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: NodePort
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: java-ms
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: java-ms
  minReplicas: 3
  maxReplicas: 9
  targetCPUUtilizationPercentage: 70
